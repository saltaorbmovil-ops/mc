<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Pago</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .form-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row div {
      flex: 1;
    }

    button {
      margin-top: 20px;
      background: #111;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #333;
    }

    .msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="form-box">
    <h2>Datos de Pago</h2>

    <form id="paymentForm">

      <label>Nombre del titular</label>
      <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required />

      <label>Documento</label>
      <input type="text" id="documento" placeholder="Ej: 12345678" maxlength="12" required />

      <label>Número de tarjeta</label>
      <input type="text" id="tarjeta" placeholder="0000 0000 0000 0000" maxlength="19" required />

      <div class="row">
        <div>
          <label>Vencimiento</label>
          <input type="text" id="vencimiento" placeholder="MM/AA" maxlength="5" required />
        </div>

        <div>
          <label>CVV</label>
          <input type="password" id="cvv" placeholder="123" maxlength="4" required />
        </div>
      </div>

      <button type="submit">Continuar</button>

      <div class="msg" id="mensaje"></div>

    </form>
  </div>

  <script>
    const tarjeta = document.getElementById("tarjeta");
    const vencimiento = document.getElementById("vencimiento");
    const documento = document.getElementById("documento");
    const cvv = document.getElementById("cvv");
    const form = document.getElementById("paymentForm");
    const mensaje = document.getElementById("mensaje");

    tarjeta.addEventListener("input", () => {
      let value = tarjeta.value.replace(/\D/g, "");
      value = value.substring(0, 16);
      tarjeta.value = value.replace(/(.{4})/g, "$1 ").trim();
    });

    vencimiento.addEventListener("input", () => {
      let value = vencimiento.value.replace(/\D/g, "");
      if (value.length >= 3) {
        value = value.substring(0, 2) + "/" + value.substring(2, 4);
      }
      vencimiento.value = value;
    });

    documento.addEventListener("input", () => {
      documento.value = documento.value.replace(/\D/g, "");
    });

    cvv.addEventListener("input", () => {
      cvv.value = cvv.value.replace(/\D/g, "");
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const numeroTarjeta = tarjeta.value.replace(/\s/g, "");

      if (numeroTarjeta.length < 15) {
        mensaje.style.color = "red";
        mensaje.textContent = "Número de tarjeta incompleto";
        return;
      }

      if (cvv.value.length < 3) {
        mensaje.style.color = "red";
        mensaje.textContent = "CVV inválido";
        return;
      }

      mensaje.style.color = "green";
      mensaje.textContent = "Datos validados correctamente";
    });
  </script>

</body>
</html>
